services:
  postgres:
    image: postgres:16-alpine
    container_name: vtc-manager-postgres
    environment:
      POSTGRES_DB: vtc_manager
      POSTGRES_USER: vtc_user
      POSTGRES_PASSWORD: vtc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vtc_user -d vtc_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
