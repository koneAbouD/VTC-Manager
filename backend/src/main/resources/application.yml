spring:
  application:
    name: vtc-manager

  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vtc_manager}}
    username: ${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:vtc_user}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:vtc_password}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Limites de taille des documents uploadés (carte grise, assurance, etc.)
  servlet:
    multipart:
      # Taille maximale d'un fichier document
      max-file-size: ${MAX_FILE_SIZE:8MB}
      # Taille maximale de la requête complète (fichier + métadonnées)
      max-request-size: ${MAX_REQUEST_SIZE:10MB}

  security:
    oauth2:
      resourceserver:
        jwt:
          # URL d'émission du realm Keycloak
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/vtc-manager}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/vtc-manager/protocol/openid-connect/certs}

server:
  port: 8081
  tomcat:
    # Laisse Tomcat consommer tout le corps d'une requête trop volumineuse afin
    # que Spring renvoie proprement le 413 (sinon la connexion est coupée et le
    # client ne reçoit jamais le message de dépassement de taille).
    max-swallow-size: -1

# Configuration pour le scheduler (rappels de maintenance)
app:
  scheduler:
    maintenance-reminder-cron: "0 0 8 * * *" # tous les jours à 8h
    indisponibilite-cron: "0 5 0 * * *"      # tous les jours à 00h05 (active/clôture)
    vidange-reminder-cron: "0 30 8 * * *"    # tous les jours à 8h30 (planifie les vidanges à J-7)
  cors:
    allowed-origins: "*"

  # OCR des quittances de paiement scannées / photographiées (Phase 2).
  # Le backend rend la page en image (PDFBox) puis l'envoie au service OCR
  # HTTP « tesseract » (conteneur hertzg/tesseract-server, port 8884).
  #   - Local (backend hors conteneur) : http://localhost:8884
  #   - Prod (backend en conteneur)     : http://tesseract:8884 (réseau infra)
  ocr:
    enabled: ${OCR_ENABLED:true}
    url: ${OCR_URL:http://localhost:8884}
    langs: ${OCR_LANGS:fra+eng}
    dpi: ${OCR_DPI:200}
    max-pages: ${OCR_MAX_PAGES:10}

  # Compression des documents (relevés/quittances) avant archivage MinIO :
  # image → JPEG redimensionné ; PDF scanné → pages ré-encodées en JPEG ;
  # PDF natif (couche texte) conservé. L'extraction reste faite sur l'original.
  storage:
    compress:
      enabled: ${STORAGE_COMPRESS_ENABLED:true}
      max-dimension: ${STORAGE_COMPRESS_MAX_DIM:2200}
      jpeg-quality: ${STORAGE_COMPRESS_JPEG_QUALITY:0.75}
      pdf-dpi: ${STORAGE_COMPRESS_PDF_DPI:150}
      max-pages: ${STORAGE_COMPRESS_MAX_PAGES:20}

  # Paiement Mobile Money (V2 app chauffeur)
  payment:
    # Agrégateur actif : "simulation" (défaut) ou un fournisseur réel à brancher.
    provider: ${PAYMENT_PROVIDER:simulation}
    # URL publique du backend, cible des webhooks agrégateur.
    callback-base-url: ${PAYMENT_CALLBACK_BASE_URL:http://localhost:8081}
    simulation:
      # En simulation, le polling de statut conclut le paiement en REUSSI.
      auto-success: ${PAYMENT_SIM_AUTO_SUCCESS:true}

  # Configuration Keycloak — le backend gère toute l'authentification
  keycloak:
    auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
    realm: ${KEYCLOAK_REALM:vtc-manager}
    # Client pour l'authentification des utilisateurs (login/refresh/logout)
    client-id: ${KEYCLOAK_CLIENT_ID:vtc-manager-backend}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:xXY4bWOidZELQEr1avPRCXzk45L9pc3b}
    # Client admin (service account) pour la gestion des utilisateurs et rôles
    admin:
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:vtc-manager-admin}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:ZxkzmwzbjcGRy1IZtEJ773vLJQ7B8qw1}

  # Envoi des OTP de l'app chauffeur via WhatsApp Cloud API (Meta).
  # En dev (enabled=false), le code est journalisé au lieu d'être envoyé.
  whatsapp:
    enabled: ${WHATSAPP_ENABLED:false}
    api-url: ${WHATSAPP_API_URL:https://graph.facebook.com}
    api-version: ${WHATSAPP_API_VERSION:v21.0}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    template-name: ${WHATSAPP_TEMPLATE_NAME:otp_login}
    template-language: ${WHATSAPP_TEMPLATE_LANGUAGE:fr}

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:vtc-documents}

logging:
  level:
    org.springframework.security: INFO
    com.tmk.vtcmanager: DEBUG