name: OCR — Build & Push Docker image

# Construit l'image du micro-service OCR (Tesseract, dossier ocr/) et la pousse
# sur GitHub Container Registry (ghcr.io). Ne se déclenche que si ocr/ change :
# ce service évolue rarement.
on:
  push:
    branches: [ main ]
    tags: [ "v*.*.*" ]
    paths:
      - "ocr/**"
      - ".github/workflows/ocr-docker.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag supplémentaire pour l'image (ex. 1.0.0)"
        required: false
        default: ""

# Nécessaire pour que GITHUB_TOKEN puisse pousser sur GHCR
permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Connexion à GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action met automatiquement le nom d'image en minuscules
      - name: Métadonnées (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-ocr
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event.inputs.version != '' }}

      - name: Build & push de l'image
        uses: docker/build-push-action@v7
        with:
          context: ./ocr
          file: ./ocr/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
