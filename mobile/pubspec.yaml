name: vtc_manager
description: Application mobile de gestion d'une entreprise de VTC
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Gestion d'état
  flutter_riverpod: ^2.5.1

  # HTTP / API
  http: ^1.2.1

  # Sérialisation
  json_annotation: ^4.9.0

  # Auth (stockage sécurisé des tokens)
  flutter_secure_storage: ^9.2.2

  # Cartes
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # Notifications Firebase
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4

  # Functional programming / Either
  fpdart: ^1.1.0

  # Format / dates
  intl: ^0.20.2

  # Ouverture d'URLs / téléchargement de fichiers
  url_launcher: ^6.3.0

  # Prévisualisation PDF (natif iOS/Android, PDF.js web)
  pdfx: ^2.9.0

  # Sélection d'image (caméra / galerie)
  image_picker: ^1.1.2

  # Sélection de fichiers (PDF, images) pour les documents
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  # Génération des icônes de lancement (remplace le logo Flutter par défaut)
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# ── Icône de lancement de l'app (TMK) ────────────────────────────────────────
# Génère les icônes Android/iOS à partir du logo :
#   flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  # ⚠️ Doit être une image CARRÉE (ex. 1024×1024, fond blanc).
  image_path: "assets/images/logo_tmk_icon.png"
  # Icône adaptative Android (le logo a un fond blanc)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_tmk_icon.png"
